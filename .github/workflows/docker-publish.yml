name: Build and publish Docker image

on:
  push:
    branches: [master]
    tags: ['*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and push (e.g. original, v1.2.3)'
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            type=sha,prefix=,format=short,enable=${{ github.ref == 'refs/heads/master' }}
            type=ref,event=tag
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

      # For the 'original' tag: re-tag the unmodified atlassian image rather than
      # rebuilding from source (the original Dockerfile uses EOL Debian Stretch).
      - name: Re-tag original from atlassian/nucleus:circle-92
        if: github.ref_name == 'original' || github.event.inputs.tag == 'original'
        run: |
          docker pull atlassian/nucleus:circle-92
          docker tag atlassian/nucleus:circle-92 ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:original
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:original

      - name: Build and push from source
        if: github.ref_name != 'original' && github.event.inputs.tag != 'original'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
